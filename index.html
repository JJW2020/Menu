<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Menu Ordering</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f8; color: #333;
    }

    header {
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      color: #fff; text-align: center; padding: 32px 16px;
    }
    header h1 { font-size: 2.2rem; letter-spacing: 1px; }
    header p  { font-size: 1.05rem; opacity: .85; margin-top: 6px; }

    .container {
      max-width: 1100px; margin: 24px auto; padding: 0 16px;
      display: flex; gap: 24px; align-items: flex-start;
    }
    .menu-section { flex: 2; }
    .cart-section {
      flex: 1; position: sticky; top: 24px;
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 20px;
    }

    .category-title {
      font-size: 1.3rem; margin: 24px 0 12px;
      border-bottom: 2px solid #ee5a24; display: inline-block;
      padding-bottom: 4px;
    }

    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap: 16px; }
    .menu-card {
      background: #fff; border-radius: 12px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.06); transition: transform .2s;
    }
    .menu-card:hover { transform: translateY(-3px); box-shadow: 0 4px 16px rgba(0,0,0,.1); }
    .menu-card img { width: 100%; height: 150px; object-fit: cover; }
    .menu-card-body { padding: 14px; }
    .menu-card-body h3 { font-size: 1rem; }
    .menu-card-body .desc { font-size: .82rem; color: #777; margin: 4px 0 10px; }
    .menu-card-body .bottom { display: flex; justify-content: space-between; align-items: center; }
    .price { font-weight: 700; color: #ee5a24; font-size: 1.05rem; }
    .add-btn {
      background: #ee5a24; color: #fff; border: none; padding: 6px 14px;
      border-radius: 6px; cursor: pointer; font-size: .85rem; transition: background .2s;
    }
    .add-btn:hover { background: #d63031; }

    .cart-section h2 { font-size: 1.2rem; margin-bottom: 12px; }
    .cart-empty { color: #aaa; font-size: .9rem; }
    .cart-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid #eee; font-size: .9rem;
    }
    .cart-item-name { flex: 1; }
    .qty-controls button {
      width: 26px; height: 26px; border: none; border-radius: 4px;
      cursor: pointer; font-weight: 700; font-size: .9rem;
      background: #eee; margin: 0 2px;
    }
    .qty-controls button:hover { background: #ddd; }
    .qty-controls span { display: inline-block; width: 22px; text-align: center; }
    .cart-total {
      margin-top: 14px; font-size: 1.1rem; font-weight: 700;
      text-align: right; color: #ee5a24;
    }

    .checkout-btn {
      width: 100%; margin-top: 14px; padding: 12px;
      background: #ee5a24; color: #fff; border: none; border-radius: 8px;
      font-size: 1rem; cursor: pointer; transition: background .2s; font-weight: 600;
    }
    .checkout-btn:hover { background: #d63031; }
    .checkout-btn:disabled { background: #ccc; cursor: default; }

    .overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
      justify-content: center; align-items: center; z-index: 100;
    }
    .overlay.active { display: flex; }
    .modal {
      background: #fff; border-radius: 14px; padding: 30px;
      width: 90%; max-width: 440px; position: relative;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 8px 30px rgba(0,0,0,.15);
    }
    .modal h2 { margin-bottom: 16px; text-align: center; font-size: 1.3rem; }
    .modal label { display: block; margin-top: 12px; font-size: .88rem; font-weight: 600; color: #444; }
    .modal input, .modal textarea {
      width: 100%; padding: 10px 12px; margin-top: 4px;
      border: 1px solid #ddd; border-radius: 8px; font-size: .9rem;
      transition: border-color .2s;
    }
    .modal input:focus, .modal textarea:focus {
      outline: none; border-color: #ee5a24;
    }
    .modal textarea { resize: vertical; height: 65px; }
    .modal-actions { margin-top: 20px; display: flex; gap: 10px; }
    .modal-actions button {
      flex: 1; padding: 12px; border: none; border-radius: 8px;
      cursor: pointer; font-size: .95rem; transition: background .2s; font-weight: 600;
    }
    .modal-actions .confirm { background: #ee5a24; color: #fff; }
    .modal-actions .confirm:hover { background: #d63031; }
    .modal-actions .cancel  { background: #f0f0f0; color: #555; }
    .modal-actions .cancel:hover { background: #e0e0e0; }

    .summary-divider { border: none; border-top: 1px dashed #ddd; margin: 16px 0; }
    .summary-info { margin-top: 8px; font-size: .93rem; line-height: 2; }
    .summary-info .label { font-weight: 700; color: #555; }
    .summary-section {
      background: #fafafa; border-radius: 10px; padding: 14px 16px; margin-top: 16px;
      border: 1px solid #f0f0f0;
    }
    .summary-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; font-size: .9rem; border-bottom: 1px solid #eee;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-row .item-name { flex: 1; }
    .summary-row .item-qty { width: 45px; text-align: center; color: #888; font-size: .85rem; }
    .summary-row .item-price { min-width: 70px; text-align: right; font-weight: 600; }
    .summary-total {
      display: flex; justify-content: space-between; margin-top: 16px;
      font-size: 1.2rem; font-weight: 700; color: #ee5a24;
      border-top: 2px solid #ee5a24; padding-top: 12px;
    }
    .whatsapp-btn {
      width: 100%; margin-top: 22px; padding: 14px;
      background: #25D366; color: #fff; border: none; border-radius: 10px;
      font-size: 1.05rem; cursor: pointer; transition: background .2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-weight: 700; box-shadow: 0 3px 10px rgba(37,211,102,.3);
    }
    .whatsapp-btn:hover { background: #1ebe57; }
    .whatsapp-btn svg { width: 22px; height: 22px; fill: #fff; }
    .back-btn {
      width: 100%; margin-top: 10px; padding: 12px;
      background: #f0f0f0; color: #555; border: none; border-radius: 10px;
      font-size: .95rem; cursor: pointer; transition: background .2s; font-weight: 600;
    }
    .back-btn:hover { background: #e0e0e0; }

    @media (max-width: 740px) {
      .container { flex-direction: column; }
      .cart-section { position: static; }
    }
  </style>
</head>
<body>

<header>
  <h1>&#127869;&#65039; 77JJ Bistro</h1>
  <p>Food with Love & Joy!</p>
</header>

<div class="container">
  <div class="menu-section" id="menuSection"></div>
  <div class="cart-section">
    <h2>&#128722; Your Order</h2>
    <div id="cartItems"><p class="cart-empty">Your cart is empty.</p></div>
    <div class="cart-total" id="cartTotal"></div>
    <button class="checkout-btn" id="checkoutBtn" disabled onclick="openCheckout()">Checkout</button>
  </div>
</div>

<div class="overlay" id="checkoutOverlay">
  <div class="modal">
    <h2>&#128221; Complete Your Order</h2>
    <label>Name</label>
    <input type="text" id="custName" />
    <label>Notes</label>
    <textarea id="custNotes"></textarea>
    <div class="modal-actions">
      <button class="cancel" onclick="closeCheckout()">Cancel</button>
      <button class="confirm" onclick="showSummary()">Review Order &#8594;</button>
    </div>
  </div>
</div>

<div class="overlay" id="summaryOverlay">
  <div class="modal">
    <h2>&#9989; Order Summary</h2>
    <hr class="summary-divider" />
    <div class="summary-info" id="summaryInfo"></div>
    <div class="summary-section" id="summaryItems"></div>
    <div class="summary-total" id="summaryTotal"></div>
    <button class="whatsapp-btn" onclick="sendWhatsApp()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Send via WhatsApp
    </button>
    <button class="back-btn" onclick="closeSummary()">&#8592; Back</button>
  </div>
</div>

<script>
var menuData = [
  { category: "&#127828; Burgers", items: [
    { id:1,  name:"Classic Burger",    price:9.99,  desc:"Beef patty, lettuce, tomato, cheese", img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&h=300&fit=crop" },
    { id:2,  name:"Chicken Burger",    price:10.49, desc:"Grilled chicken, avocado, ranch",      img:"https://images.unsplash.com/photo-1625813506062-0aeb1f7a8214?w=400&h=300&fit=crop" },
    { id:3,  name:"Veggie Burger",     price:8.99,  desc:"Black bean patty, pickles, chipotle",  img:"https://images.unsplash.com/photo-1520072959219-c595dc870360?w=400&h=300&fit=crop" },
  ]},
  { category: "&#127829; Pizza", items: [
    { id:4,  name:"Margherita",        price:12.99, desc:"Tomato, mozzarella, fresh basil",      img:"https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=400&h=300&fit=crop" },
    { id:5,  name:"Pepperoni",         price:13.99, desc:"Classic pepperoni with extra cheese",   img:"https://images.unsplash.com/photo-1628840042765-356cda07504e?w=400&h=300&fit=crop" },
    { id:6,  name:"BBQ Chicken",       price:14.49, desc:"BBQ sauce, chicken, red onion",         img:"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=400&h=300&fit=crop" },
  ]},
  { category: "&#129367; Salads", items: [
    { id:7,  name:"Caesar Salad",      price:7.99,  desc:"Romaine, parmesan, croutons",          img:"https://images.unsplash.com/photo-1546793665-c74683f339c1?w=400&h=300&fit=crop" },
    { id:8,  name:"Greek Salad",       price:8.49,  desc:"Feta, olives, cucumber, tomato",       img:"https://images.unsplash.com/photo-1540420773420-3366772f4999?w=400&h=300&fit=crop" },
  ]},
  { category: "&#129380; Drinks", items: [
    { id:9,  name:"Iced Lemonade",     price:3.49,  desc:"Fresh-squeezed with mint",              img:"https://images.unsplash.com/photo-1621263764928-df1444c5e859?w=400&h=300&fit=crop" },
    { id:10, name:"Mango Smoothie",    price:5.49,  desc:"Mango, banana, yogurt",                 img:"https://images.unsplash.com/photo-1623065422902-30a2d299bbe4?w=400&h=300&fit=crop" },
  ]},
];

var cart = {};
var pendingName = '';
var pendingNotes = '';
var pendingMessage = '';

var menuEl = document.getElementById('menuSection');
menuData.forEach(function(cat) {
  var html = '<h2 class="category-title">' + cat.category + '</h2><div class="menu-grid">';
  cat.items.forEach(function(it) {
    html +=
      '<div class="menu-card">' +
        '<img src="' + it.img + '" alt="' + it.name + '" loading="lazy" />' +
        '<div class="menu-card-body">' +
          '<h3>' + it.name + '</h3>' +
          '<p class="desc">' + it.desc + '</p>' +
          '<div class="bottom">' +
            '<span class="price">$' + it.price.toFixed(2) + '</span>' +
            '<button class="add-btn" onclick="addToCart(' + it.id + ')">+ Add</button>' +
          '</div>' +
        '</div>' +
      '</div>';
  });
  html += '</div>';
  menuEl.innerHTML += html;
});

function findItem(id) {
  for (var c = 0; c < menuData.length; c++)
    for (var i = 0; i < menuData[c].items.length; i++)
      if (menuData[c].items[i].id === id) return menuData[c].items[i];
}

function addToCart(id) {
  if (cart[id]) {
    cart[id].qty++;
  } else {
    var item = findItem(id);
    cart[id] = { name: item.name, price: item.price, qty: 1 };
  }
  renderCart();
}

function changeQty(id, delta) {
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  renderCart();
}

function renderCart() {
  var el = document.getElementById('cartItems');
  var totalEl = document.getElementById('cartTotal');
  var btn = document.getElementById('checkoutBtn');
  var keys = Object.keys(cart);
  if (!keys.length) {
    el.innerHTML = '<p class="cart-empty">Your cart is empty.</p>';
    totalEl.textContent = '';
    btn.disabled = true;
    return;
  }
  var html = '', total = 0;
  keys.forEach(function(k) {
    var c = cart[k];
    var sub = c.price * c.qty; total += sub;
    html +=
      '<div class="cart-item">' +
        '<span class="cart-item-name">' + c.name + '</span>' +
        '<div class="qty-controls">' +
          '<button onclick="changeQty(' + k + ',-1)">&minus;</button>' +
          '<span>' + c.qty + '</span>' +
          '<button onclick="changeQty(' + k + ',1)">+</button>' +
        '</div>' +
        '<span style="min-width:58px;text-align:right">$' + sub.toFixed(2) + '</span>' +
      '</div>';
  });
  el.innerHTML = html;
  totalEl.textContent = 'Total: $' + total.toFixed(2);
  btn.disabled = false;
}

function openCheckout()  { document.getElementById('checkoutOverlay').classList.add('active'); }
function closeCheckout() { document.getElementById('checkoutOverlay').classList.remove('active'); }

function showSummary() {
  var name = document.getElementById('custName').value.trim();
  var notes = document.getElementById('custNotes').value.trim();
  if (!name) { alert('Please enter your name.'); return; }

  pendingName = name;
  pendingNotes = notes;

  var infoHtml =
    '<p><span class="label">Name:</span> ' + name + '</p>' +
    '<p><span class="label">Notes:</span> ' + (notes || 'None') + '</p>';
  document.getElementById('summaryInfo').innerHTML = infoHtml;

  var itemsHtml = '';
  var total = 0;
  var msgItems = [];
  Object.keys(cart).forEach(function(k) {
    var c = cart[k];
    var sub = c.price * c.qty;
    total += sub;
    itemsHtml +=
      '<div class="summary-row">' +
        '<span class="item-name">' + c.name + '</span>' +
        '<span class="item-qty">x' + c.qty + '</span>' +
        '<span class="item-price">$' + sub.toFixed(2) + '</span>' +
      '</div>';
    msgItems.push(c.name + ' x' + c.qty + '  $' + sub.toFixed(2));
  });
  document.getElementById('summaryItems').innerHTML = itemsHtml;
  document.getElementById('summaryTotal').innerHTML =
    '<span>Total</span><span>$' + total.toFixed(2) + '</span>';

  var lines = [
    '--- NEW ORDER ---',
    '',
    'Name: ' + name,
    'Notes: ' + (notes || 'None'),
    '',
    '--- Items ---'
  ];
  for (var m = 0; m < msgItems.length; m++) {
    lines.push(msgItems[m]);
  }
  lines.push('');
  lines.push('TOTAL: $' + total.toFixed(2));
  lines.push('--- END ---');
  pendingMessage = lines.join('\n');

  closeCheckout();
  document.getElementById('summaryOverlay').classList.add('active');
}

function closeSummary() {
  document.getElementById('summaryOverlay').classList.remove('active');
  openCheckout();
}

function sendWhatsApp() {
  var yourNumber = '14373406679';
  window.open('https://wa.me/' + yourNumber + '?text=' + encodeURIComponent(pendingMessage), '_blank');

  alert('Thanks, ' + pendingName + '! Please send the message in WhatsApp to confirm your order.');
  cart = {};
  renderCart();
  document.getElementById('summaryOverlay').classList.remove('active');
  document.getElementById('custName').value = '';
  document.getElementById('custNotes').value = '';
}
</script>
</body>
</html>
